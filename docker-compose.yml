services:
  postgres:
    image: postgres:16-alpine
    container_name: cvoptimizador-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cvoptimizador
      POSTGRES_PASSWORD: cvoptimizador_dev_2024
      POSTGRES_DB: cvoptimizador
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvoptimizador -d cvoptimizador"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
